# CPU method configurations
# Group A: Framework defaults (no hyperparameter tuning)
# Group B: Recommended configs (standard hyperparameters)

methods:
  # Group A: Framework defaults
  - name: greedy
    strategy_class: greedy
    group: A

  - name: vllm_default
    strategy_class: temperature_only
    params: {}
    temperature: 1.0
    group: A

  - name: hf_default
    strategy_class: top_k
    params: {top_k: 50}
    temperature: 1.0
    group: A

  # Group B: Recommended configs
  - name: top_p_0.9
    strategy_class: top_p
    params: {top_p: 0.9}
    temperature: 0.7
    group: B

  - name: top_p_0.95
    strategy_class: top_p
    params: {top_p: 0.95}
    temperature: 0.7
    group: B

  - name: top_k_40
    strategy_class: top_k
    params: {top_k: 40}
    temperature: 0.7
    group: B

  - name: min_p_0.05
    strategy_class: min_p
    params: {min_p: 0.05}
    temperature: 0.7
    group: B

  # p-less: zero hyperparameter, test at multiple temperatures
  - name: p_less_t0.7
    strategy_class: p_less
    temperature: 0.7
    group: B

  - name: p_less_t1.0
    strategy_class: p_less
    temperature: 1.0
    group: B

  - name: p_less_norm_t0.7
    strategy_class: p_less_norm
    temperature: 0.7
    group: B

  - name: p_less_norm_t1.0
    strategy_class: p_less_norm
    temperature: 1.0
    group: B
